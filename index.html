<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BI & Market Research Dashboard</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --bg-color: #f0f2f5;
            --text-color: #333;
        }
        body {
            font-family: 'Segoe UI', Pyidaungsu, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
        }
        .container {
            max-width: 1000px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        h2, h3 {
            color: var(--primary-color);
            text-align: center;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        .form-group.full-width {
            grid-column: span 2;
        }
        label {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 14px;
        }
        input, select, textarea {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
        }
        button {
            padding: 12px 20px;
            border: none;
            background-color: #28a745;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
            width: 100%;
        }
        button:hover { background-color: #218838; }
        button:disabled { background-color: #6c757d; cursor: not-allowed; }
        .refresh-btn { background-color: var(--primary-color); margin-bottom: 15px; width: auto; }
        .refresh-btn:hover { background-color: #004494; }
        
        .table-container {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background: white;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
            font-size: 14px;
        }
        th {
            background-color: var(--primary-color);
            color: white;
            position: sticky;
            top: 0;
        }
        tr:nth-child(even) { background-color: #f9f9f9; }
        tr:hover { background-color: #f1f1f1; }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 BI & Market Research Real-Time Dashboard</h2>
    <p style="text-align:center; font-size: 14px; color: #666;">
        ဈေးကွက်၊ ပြိုင်ဘက်၊ ငွေကြေး နှင့် ကမ္ဘာ့စီးပွားရေး အချက်အလက်များကို အချိန်နှင့်တပြေးညီ စောင့်ကြည့်ရန်
    </p>

    <!-- Data Entry Form -->
    <form id="biForm">
        <div class="form-grid">
            <div class="form-group">
                <label>ရက်စွဲ (Date)</label>
                <input type="date" id="dateInput" required>
            </div>
            
            <div class="form-group">
                <label>အချက်အလက် အမျိုးအစား (Category)</label>
                <select id="categoryInput" required>
                    <option value="">ရွေးချယ်ပါ...</option>
                    <option value="Customer & Demand">၁။ ဝယ်သူ၏ အမူအကျင့်နှင့် ဝယ်လိုအား</option>
                    <option value="Competitor Intelligence">၂။ ပြိုင်ဘက်များ၏ လှုပ်ရှားမှု</option>
                    <option value="Internal Financial & Sales">၃။ လုပ်ငန်းတွင်း ငွေကြေးနှင့် အရောင်း</option>
                    <option value="Macro Environment">၄။ ကမ္ဘာ့စီးပွားရေးနှင့် မူဝါဒ</option>
                    <option value="Risk & Security">၅။ အန္တရာယ်နှင့် လုံခြုံရေး</option>
                </select>
            </div>

            <div class="form-group">
                <label>အသုံးပြုသည့် ကိရိယာ (Tools Used)</label>
                <input type="text" id="toolInput" placeholder="ဥပမာ - Google Trends, SEMrush, Power BI..." required>
            </div>

            <div class="form-group">
                <label>တွေ့ရှိချက် အချက်အလက် (Data Point / Insight)</label>
                <input type="text" id="dataPointInput" placeholder="ဥပမာ - ပြိုင်ဘက်က ဈေး ၁၀% ချရောင်းနေသည်" required>
            </div>

            <div class="form-group full-width">
                <label>လုပ်ဆောင်မည့် အစီအစဉ် / ရလဒ် (Action Plan / Result)</label>
                <textarea id="actionPlanInput" rows="3" placeholder="ဥပမာ - မိမိလုပ်ငန်းက သာလွန်အောင် ပရိုမိုးရှင်း အသစ်ဆွဲမည်..." required></textarea>
            </div>
        </div>
        <button type="submit" id="submitBtn">အချက်အလက်များကို သိမ်းဆည်းမည် (Submit Data)</button>
    </form>

    <hr style="margin: 30px 0; border: 1px solid #eee;">

    <h3>📈 စောင့်ကြည့်လေ့လာထားသော အချက်အလက်များ</h3>
    <button class="refresh-btn" onclick="loadData()">🔄 Data များကို ပြန်လည်ဆွဲယူမည် (Refresh)</button>

    <div class="table-container">
        <table id="dataTable">
            <thead>
                <tr>
                    <th>ရက်စွဲ</th>
                    <th>အမျိုးအစား</th>
                    <th>တွေ့ရှိချက်</th>
                    <th>အသုံးပြုသည့် Tool</th>
                    <th>လုပ်ဆောင်မည့် အစီအစဉ်</th>
                </tr>
            </thead>
            <tbody>
                <!-- Data များ ဤနေရာတွင် ပေါ်လာမည် -->
            </tbody>
        </table>
    </div>
</div>

<script>
    // သင်၏ SheetDB API URL
    const API_URL = 'https://sheetdb.io/api/v1/6zk630pgtw0p4';

    // (၁) အချက်အလက်များ ဆွဲယူခြင်း (GET Request)
    async function loadData() {
        const tbody = document.querySelector('#dataTable tbody');
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">အချက်အလက်များ ရှာဖွေနေပါသည်... (Loading...)</td></tr>';
        
        try {
            const response = await fetch(API_URL);
            if (!response.ok) throw new Error('Network Error');
            
            const data = await response.json();
            tbody.innerHTML = ''; 
            
            // ဒေတာမရှိပါက ပြသမည့်စာ
            if(data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">အချက်အလက်များ မရှိသေးပါ။</td></tr>';
                return;
            }
            
            // နောက်ဆုံးသွင်းထားသော Data ကို အပေါ်ဆုံးမှာပြရန် .reverse()
            data.reverse().forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${row.Date || '-'}</td>
                    <td><span style="background-color:#e9ecef; padding:4px 8px; border-radius:4px; font-size:12px;">${row.Category || '-'}</span></td>
                    <td>${row.Data_Point || '-'}</td>
                    <td>${row.Tool_Used || '-'}</td>
                    <td>${row.Action_Plan || '-'}</td>
                `;
                tbody.appendChild(tr);
            });
        } catch (error) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:red;">အချက်အလက် ရယူရာတွင် အမှားအယွင်းရှိနေပါသည်။ Data ဆွဲယူ၍မရပါ။</td></tr>';
            console.error('Fetch Error:', error);
        }
    }

    // (၂) အချက်အလက်များ ပေးပို့ခြင်း (POST Request - JSON Format)
    document.getElementById('biForm').addEventListener('submit', async function(e) {
        e.preventDefault(); // ပုံမှန် Refresh ဖြစ်ခြင်းကို တားမည်
        
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.innerText = 'သိမ်းဆည်းနေပါသည်... (Submitting...)';
        submitBtn.disabled = true;

        // JSON Format ဖြင့်ပို့ရန် Data တည်ဆောက်ခြင်း
        // Key နာမည်များသည် Google Sheet မှ Column ခေါင်းစဉ်များနှင့် အတိအကျတူရပါမည်
        const payload = {
            data: [
                {
                    "Date": document.getElementById('dateInput').value,
                    "Category": document.getElementById('categoryInput').value,
                    "Tool_Used": document.getElementById('toolInput').value,
                    "Data_Point": document.getElementById('dataPointInput').value,
                    "Action_Plan": document.getElementById('actionPlanInput').value
                }
            ]
        };

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Accept': 'application/json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });
            
            const result = await response.json();
            
            if(result.created) { // SheetDB မှ အောင်မြင်ကြောင်း (created: 1) ပြန်ပို့လျှင်
                document.getElementById('biForm').reset(); 
                await loadData(); // Table ကို ချက်ချင်း Update လုပ်မည်
                alert("အောင်မြင်စွာ သိမ်းဆည်းပြီးပါပြီ!");
            } else {
                throw new Error('Failed to create row');
            }
            
        } catch (error) {
            alert('အချက်အလက်ပေးပို့ခြင်း မအောင်မြင်ပါ။ Column အမည်များကို Google Sheet တွင် မှန်ကန်စွာရေးထားခြင်း ရှိ/မရှိ စစ်ဆေးပါ။');
            console.error('Post Error:', error);
        } finally {
            submitBtn.innerText = 'အချက်အလက်များကို သိမ်းဆည်းမည် (Submit Data)';
            submitBtn.disabled = false;
        }
    });

    // Website စဖွင့်သည်နှင့် Data ကို အလိုအလျောက် ဆွဲယူမည်
    window.onload = loadData;
</script>

</body>
</html>
