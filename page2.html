<!DOCTYPE html>
<html lang="blk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pa'O Sentence Collector Tool</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 {
            color: #007bff;
            text-align: center;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: vertical;
            font-size: 16px;
        }
        .btn-group {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }
        button {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn-add { background-color: #28a745; color: white; }
        .btn-clear { background-color: #dc3545; color: white; }
        .btn-sheet { background-color: #0f9d58; color: white; } /* Google Sheets Color */
        .btn-json { background-color: #6f42c1; color: white; }
        
        button:disabled {
            background-color: #cccccc !important;
            cursor: not-allowed;
        }

        .counter {
            margin-top: 15px;
            font-weight: bold;
            text-align: right;
            color: #555;
        }
        .preview-box {
            margin-top: 20px;
            background: #e9ecef;
            padding: 10px;
            border-radius: 4px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>နယ်ꩻခြွိုင်းခြိုꩻ - Pa'O Sentence Collector</h2>
    
    <label for="sentence">ပအိုဝ်းစာကြောင်း ရိုက်ထည့်ရန် (တစ်ကြောင်းချင်းစီ) :</label>
    <textarea id="sentence" placeholder="မင်္ဂလာႏဒျာႏဩ... (ပြီးလျှင် Add သို့မဟုတ် Enter နှိပ်ပါ)"></textarea>
    
    <div class="btn-group">
        <button class="btn-add" onclick="addSentence()">Add Sentence</button>
        <button class="btn-clear" onclick="clearAll()">Clear All</button>
    </div>

    <div class="counter">စုစုပေါင်းစာကြောင်းရေ: <span id="count">0</span> / 5000</div>

    <div class="preview-box">
        <label>ယခုစုဆောင်းထားသော စာကြောင်းများ Preview:</label>
        <ol id="previewList"></ol>
    </div>

    <div class="btn-group" style="margin-top: 20px;">
        <button id="btnSheet" class="btn-sheet" onclick="uploadToSheet()">Save to Google Sheet</button>
        <button class="btn-json" onclick="downloadJSON()">Download .JSON</button>
    </div>
</div>

<script>
    let sentences = [];
    const SHEETDB_API_URL = "https://sheetdb.io/api/v1/e7fhcqei9sorn";

    // Enter Key နှိပ်လျှင် Add လုပ်ရန်
    document.getElementById('sentence').addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            addSentence();
        }
    });

    function addSentence() {
        let input = document.getElementById('sentence');
        let text = input.value.trim().replace(/\s+/g, ' '); 

        if (text === "") {
            alert("စာသားတစ်ခုခု အရင်ရိုက်ထည့်ပါဗျာ။");
            return;
        }

        // ဂဏန်းများ ပါမပါ စစ်ဆေးခြင်း
        if (/[\d၀-၉]/.test(text)) {
            alert("သတိပေးချက်: စာကြောင်းထဲတွင် ဂဏန်းများမပါဝင်ရပါဗျာ။ စာသားဖြင့်သာ ရေးပေးပါ။");
            return;
        }

        // စာကြောင်း ထပ်နေခြင်း ရှိမရှိ စစ်ဆေးခြင်း
        if (sentences.includes(text)) {
            alert("သတိပေးချက်: ဒီစာကြောင်းက ထည့်ပြီးသားဖြစ်နေပါတယ်ဗျာ။");
            return;
        }

        sentences.push(text);
        input.value = ""; 
        updateUI();
    }

    function updateUI() {
        document.getElementById('count').innerText = sentences.length;
        let list = document.getElementById('previewList');
        list.innerHTML = "";
        
        sentences.forEach(function(s) {
            let li = document.createElement('li');
            li.innerText = s;
            list.appendChild(li);
        });
        
        let box = document.querySelector('.preview-box');
        box.scrollTop = box.scrollHeight;
    }

    function clearAll() {
        if (confirm("စုဆောင်းထားသမျှ အားလုံးကို ဖျက်ပစ်မှာ သေချာပါသလားဗျာ?")) {
            sentences = [];
            updateUI();
        }
    }

    // Google Sheet သို့ Data တွန်းပို့ခြင်း
    function uploadToSheet() {
        if (sentences.length === 0) {
            alert("Google Sheet သို့ ပို့ရန် စာကြောင်းမရှိသေးပါဗျာ။");
            return;
        }

        let btn = document.getElementById('btnSheet');
        btn.disabled = true;
        btn.innerText = "Sending...";

        // SheetDB API ၏ Format အတိုင်း 'data' array ထဲမှာ KEY အမည် 'PAOTEXT' ဖြင့် ပြင်ဆင်ခြင်း
        let payload = {
            data: sentences.map(s => ({ "PAOTEXT": s }))
        };

        fetch(SHEETDB_API_URL, {
            method: 'POST',
            headers: {
                'Accept': 'application/json',
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
        })
        .then(response => response.json())
        .then(data => {
            if (data.created) {
                alert(`အောင်မြင်ပါသည်! စာကြောင်းရေ (${data.created}) ကြောင်းကို Google Sheet ထဲသို့ ထည့်သွင်းပြီးပါပြီ။`);
                sentences = []; // ပို့ပြီးသားစာကြောင်းများကို စာရင်းထဲမှ ဖျက်သိမ်းခြင်း
                updateUI();
            } else {
                alert("တစ်စုံတစ်ရာ မှားယွင်းနေပါသည်။ စာရွက်စာတမ်း Key (PAOTEXT) မှန်မမှန် ပြန်စစ်ပေးပါ။");
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert("အင်တာနက်လိုင်း ချိတ်ဆက်မှု သို့မဟုတ် API သို့ ပို့ဆောင်ရာတွင် အခက်အခဲရှိနေပါသည်။");
        })
        .finally(() => {
            btn.disabled = false;
            btn.innerText = "Save to Google Sheet";
        });
    }

    // Backup အနေဖြင့် .JSON ဒေါင်းလုဒ်လုပ်ရန် ထားရှိခြင်း
    function downloadJSON() {
        if (sentences.length === 0) return alert("ဒေါင်းလုဒ်လုပ်ရန် စာကြောင်းမရှိသေးပါဗျာ။");
        
        let jsonFormat = sentences.map(s => ({
            PAOTEXT: s,
            source: "KhunPhanDuae - Pa'O Digital Hub"
        }));

        let jsonContent = JSON.stringify(jsonFormat, null, 2);
        let blob = new Blob([jsonContent], { type: "application/json;charset=utf-8" });
        
        let link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "pao_sentences_backup.json";
        link.click();
        URL.revokeObjectURL(link.href);
    }
</script>
<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ပအိုဝ်ႏ အသံ+စာသား ဒေတာ စုဆောင်းရေး Tool</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 15px;
            color: #333;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
            background: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            font-size: 18px;
            margin-bottom: 15px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            color: #555;
            margin-bottom: 5px;
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #cccccc;
            border-radius: 6px;
            font-size: 15px;
            box-sizing: border-box;
        }
        textarea {
            resize: vertical;
            height: 70px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-record { background-color: #e74c3c; color: white; }
        .btn-stop { background-color: #7f8c8d; color: white; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        audio {
            width: 100%;
            margin-top: 15px;
        }
        .status {
            margin-top: 12px;
            font-size: 13px;
            color: #27ae60;
            font-weight: bold;
            text-align: center;
        }
        .csv-box {
            background: #f8f9fa;
            border: 1px dashed #bbb;
            padding: 10px;
            border-radius: 6px;
            margin-top: 15px;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>ပအိုဝ်ႏ အသံ + CSV ဒေတာ စုဆောင်းရေး</h2>

    <div class="form-group">
        <label>၁။ အသံဖိုင် နာမည်ရိုက်ပါ (Filename):</label>
        <input type="text" id="fileNameInput" placeholder="ဥပမာ - paoh_01">
    </div>

    <div class="form-group">
        <label>၂။ တွဲမယ့် ပအိုဝ်ႏစာသား ရိုက်ပါ (Transcript):</label>
        <textarea id="paohTextInput" placeholder="ဥပမာ - မင်္ဂလာႏဒျာႏဩ"></textarea>
    </div>

    <div class="btn-group">
        <button id="recordBtn" class="btn-record">🎙️ အသံဖမ်းမည်</button>
        <button id="stopBtn" class="btn-stop" disabled>⏹️ ရပ်မည်</button>
    </div>

    <div class="status" id="statusText"></div>
    <audio id="audioPreview" controls style="display:none;"></audio>

    <div class="csv-box">
        <strong>စုဆောင်းရရှိထားသော CSV ဒေတာများ:</strong>
        <pre id="csvPreview" style="margin:5px 0 0 0; white-space: pre-wrap;">file_name,text</pre>
    </div>
</div>

<script>
    let mediaRecorder;
    let audioChunks = [];
    let csvContent = "file_name,text\n"; // CSV Header

    const fileNameInput = document.getElementById('fileNameInput');
    const paohTextInput = document.getElementById('paohTextInput');
    const recordBtn = document.getElementById('recordBtn');
    const stopBtn = document.getElementById('stopBtn');
    const audioPreview = document.getElementById('audioPreview');
    const statusText = document.getElementById('statusText');
    const csvPreview = document.getElementById('csvPreview');

    recordBtn.addEventListener('click', async () => {
        const fileName = fileNameInput.value.trim();
        const paohText = paohTextInput.value.trim();

        // Check validation
        if (!fileName || !paohText) {
            alert("အသံဖိုင်နာမည်နဲ့ စာသားကို အရင် ရိုက်ထည့်ပေးပါဗျ။");
            return;
        }

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];

            mediaRecorder.ondataavailable = event => {
                audioChunks.push(event.data);
            };

            mediaRecorder.onstop = () => {
                // 1. WAV Audio Download
                const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                const audioUrl = URL.createObjectURL(audioBlob);
                audioPreview.src = audioUrl;
                audioPreview.style.display = "block";

                const fullAudioName = `${fileName}.wav`;
                const aAudio = document.createElement('a');
                aAudio.href = audioUrl;
                aAudio.download = fullAudioName;
                aAudio.click();

                // 2. CSV Line Update & Download
                const newCsvLine = `${fullAudioName},"${paohText}"\n`;
                csvContent += newCsvLine;
                csvPreview.textContent = csvContent;

                const csvBlob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const csvUrl = URL.createObjectURL(csvBlob);
                const aCsv = document.createElement('a');
                aCsv.href = csvUrl;
                aCsv.download = "metadata.csv";
                aCsv.click();

                statusText.textContent = `✓ ${fullAudioName} နဲ့ metadata.csv ဖိုင် ဒေါင်းလုဒ်ဆွဲပြီးပါပြီ!`;

                // Clear input for next entry
                fileNameInput.value = "";
                paohTextInput.value = "";
            };

            mediaRecorder.start();
            recordBtn.disabled = true;
            stopBtn.disabled = false;
            statusText.textContent = "● အသံဖမ်းနေပါသည်...";
            statusText.style.color = "#e74c3c";
        } catch (err) {
            alert("မိုက်ခရိုဖုန်း အသုံးပြုခွင့် ပေးပါရန်။");
        }
    });

    stopBtn.addEventListener('click', () => {
        mediaRecorder.stop();
        recordBtn.disabled = false;
        stopBtn.disabled = true;
        statusText.style.color = "#27ae60";
    });
</script>

</body>
</html>
    
</body>
