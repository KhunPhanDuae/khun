<!DOCTYPE html>
<html lang="blk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pa'O Sentence Collector Tool</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 {
            color: #007bff;
            text-align: center;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: vertical;
            font-size: 16px;
        }
        .btn-group {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }
        button {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-add { background-color: #28a745; color: white; }
        .btn-txt { background-color: #17a2b8; color: white; }
        .btn-json { background-color: #6f42c1; color: white; }
        .btn-clear { background-color: #dc3545; color: white; }
        
        .counter {
            margin-top: 15px;
            font-weight: bold;
            text-align: right;
            color: #555;
        }
        .preview-box {
            margin-top: 20px;
            background: #e9ecef;
            padding: 10px;
            border-radius: 4px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>နယ်ꩻခြွိုင်းခြိုꩻ - Pa'O Sentence Collector</h2>
    
    <label for="sentence">ပအိုဝ်းစာကြောင်း ရိုက်ထည့်ရန် (တစ်ကြောင်းချင်းစီ) :</label>
    <textarea id="sentence" placeholder="မင်္ဂလာႏဒျာႏဩ... (ပြီးလျှင် Add သို့မဟုတ် Enter နှိပ်ပါ)"></textarea>
    
    <div class="btn-group">
        <button class="btn-add" onclick="addSentence()">Add Sentence</button>
        <button class="btn-clear" onclick="clearAll()">Clear All</button>
    </div>

    <div class="counter">စုစုပေါင်းစာကြောင်းရေ: <span id="count">0</span> / 5000</div>

    <div class="preview-box">
        <label>ယခုစုဆောင်းထားသော စာကြောင်းများ Preview:</label>
        <ol id="previewList"></ol>
    </div>

    <div class="btn-group" style="margin-top: 20px;">
        <button class="btn-txt" onclick="downloadTXT()">Download .TXT</button>
        <button class="btn-json" onclick="downloadJSON()">Download .JSON</button>
    </div>
</div>

<script>
    let sentences = [];

    // Enter Key နှိပ်လျှင်လည်း Add လုပ်ပေးရန်
    document.getElementById('sentence').addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            addSentence();
        }
    });

    function addSentence() {
        let input = document.getElementById('sentence');
        let text = input.value.trim();

        if (text === "") {
            alert("စာသားတစ်ခုခု အရင်ရိုက်ထည့်ပါဗျာ။");
            return;
        }

        // ဂဏန်းများ ပါမပါ စစ်ဆေးခြင်း (Common Voice စည်းကမ်းအရ)
        if (/\d/.test(text)) {
            alert("သတိပေးချက်: စာကြောင်းထဲတွင် ဂဏန်းများမပါဝင်ရပါဗျာ။ စာသားဖြင့်သာ ရေးပေးပါ။");
            return;
        }

        sentences.push(text);
        input.value = ""; // Input ကွက်လပ်ကို ရှင်းလင်းရန်
        updateUI();
    }

    function updateUI() {
        document.getElementById('count').innerText = sentences.length;
        let list = document.getElementById('previewList');
        list.innerHTML = "";
        
        // နောက်ဆုံးထည့်ထားတဲ့ စာကြောင်းတွေကို Preview ပြရန်
        sentences.forEach(function(s) {
            let li = document.createElement('li');
            li.innerText = s;
            list.appendChild(li);
        });
        
        // Preview Box ကို အောက်ဆုံးထိ ဆွဲချပေးရန်
        let box = document.querySelector('.preview-box');
        box.scrollTop = box.scrollHeight;
    }

    function clearAll() {
        if (confirm("စုဆောင်းထားသမျှ အားလုံးကို ဖျက်ပစ်မှာ သေချာပါသလားဗျာ?")) {
            sentences = [];
            updateUI();
        }
    }

    // .TXT ဖိုင်အဖြစ် ဒေါင်းလုဒ်လုပ်ခြင်း
    function downloadTXT() {
        if (sentences.length === 0) return alert("ဒေါင်းလုဒ်လုပ်ရန် စာကြောင်းမရှိသေးပါဗျာ။");
        
        let txtContent = sentences.join("\n");
        let blob = new Blob([txtContent], { type: "text/plain;charset=utf-8" });
        saveFile(blob, "pao_sentences.txt");
    }

    // .JSON ဖိုင်အဖြစ် ဒေါင်းလုဒ်လုပ်ခြင်း
    function downloadJSON() {
        if (sentences.length === 0) return alert("ဒေါင်းလုဒ်လုပ်ရန် စာကြောင်းမရှိသေးပါဗျာ။");
        
        let jsonFormat = sentences.map(s => ({
            text: s,
            source: "KhunPhanDuae - Pa'O Digital Hub"
        }));

        let jsonContent = JSON.stringify(jsonFormat, null, 2);
        let blob = new Blob([jsonContent], { type: "application/json;charset=utf-8" });
        saveFile(blob, "pao_sentences.json");
    }

    // Browser မှတစ်ဆင့် ဖိုင်သိမ်းဆည်းရန် Function
    function saveFile(blob, filename) {
        let link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = filename;
        link.click();
        URL.revokeObjectURL(link.href);
    }
</script>

</body>
</html>
