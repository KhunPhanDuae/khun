<!DOCTYPE html>
<html lang="blk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pa'O Sentence Collector Tool</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 {
            color: #007bff;
            text-align: center;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: vertical;
            font-size: 16px;
        }
        .btn-group {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }
        button {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn-add { background-color: #28a745; color: white; }
        .btn-clear { background-color: #dc3545; color: white; }
        .btn-sheet { background-color: #0f9d58; color: white; } /* Google Sheets Color */
        .btn-json { background-color: #6f42c1; color: white; }
        
        button:disabled {
            background-color: #cccccc !important;
            cursor: not-allowed;
        }

        .counter {
            margin-top: 15px;
            font-weight: bold;
            text-align: right;
            color: #555;
        }
        .preview-box {
            margin-top: 20px;
            background: #e9ecef;
            padding: 10px;
            border-radius: 4px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>နယ်ꩻခြွိုင်းခြိုꩻ - Pa'O Sentence Collector</h2>
    
    <label for="sentence">ပအိုဝ်းစာကြောင်း ရိုက်ထည့်ရန် (တစ်ကြောင်းချင်းစီ) :</label>
    <textarea id="sentence" placeholder="မင်္ဂလာႏဒျာႏဩ... (ပြီးလျှင် Add သို့မဟုတ် Enter နှိပ်ပါ)"></textarea>
    
    <div class="btn-group">
        <button class="btn-add" onclick="addSentence()">Add Sentence</button>
        <button class="btn-clear" onclick="clearAll()">Clear All</button>
    </div>

    <div class="counter">စုစုပေါင်းစာကြောင်းရေ: <span id="count">0</span> / 5000</div>

    <div class="preview-box">
        <label>ယခုစုဆောင်းထားသော စာကြောင်းများ Preview:</label>
        <ol id="previewList"></ol>
    </div>

    <div class="btn-group" style="margin-top: 20px;">
        <button id="btnSheet" class="btn-sheet" onclick="uploadToSheet()">Save to Google Sheet</button>
        <button class="btn-json" onclick="downloadJSON()">Download .JSON</button>
    </div>
</div>

<script>
    let sentences = [];
    const SHEETDB_API_URL = "https://sheetdb.io/api/v1/e7fhcqei9sorn";

    // Enter Key နှိပ်လျှင် Add လုပ်ရန်
    document.getElementById('sentence').addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            addSentence();
        }
    });

    function addSentence() {
        let input = document.getElementById('sentence');
        let text = input.value.trim().replace(/\s+/g, ' '); 

        if (text === "") {
            alert("စာသားတစ်ခုခု အရင်ရိုက်ထည့်ပါဗျာ။");
            return;
        }

        // ဂဏန်းများ ပါမပါ စစ်ဆေးခြင်း
        if (/[\d၀-၉]/.test(text)) {
            alert("သတိပေးချက်: စာကြောင်းထဲတွင် ဂဏန်းများမပါဝင်ရပါဗျာ။ စာသားဖြင့်သာ ရေးပေးပါ။");
            return;
        }

        // စာကြောင်း ထပ်နေခြင်း ရှိမရှိ စစ်ဆေးခြင်း
        if (sentences.includes(text)) {
            alert("သတိပေးချက်: ဒီစာကြောင်းက ထည့်ပြီးသားဖြစ်နေပါတယ်ဗျာ။");
            return;
        }

        sentences.push(text);
        input.value = ""; 
        updateUI();
    }

    function updateUI() {
        document.getElementById('count').innerText = sentences.length;
        let list = document.getElementById('previewList');
        list.innerHTML = "";
        
        sentences.forEach(function(s) {
            let li = document.createElement('li');
            li.innerText = s;
            list.appendChild(li);
        });
        
        let box = document.querySelector('.preview-box');
        box.scrollTop = box.scrollHeight;
    }

    function clearAll() {
        if (confirm("စုဆောင်းထားသမျှ အားလုံးကို ဖျက်ပစ်မှာ သေချာပါသလားဗျာ?")) {
            sentences = [];
            updateUI();
        }
    }

    // Google Sheet သို့ Data တွန်းပို့ခြင်း
    function uploadToSheet() {
        if (sentences.length === 0) {
            alert("Google Sheet သို့ ပို့ရန် စာကြောင်းမရှိသေးပါဗျာ။");
            return;
        }

        let btn = document.getElementById('btnSheet');
        btn.disabled = true;
        btn.innerText = "Sending...";

        // SheetDB API ၏ Format အတိုင်း 'data' array ထဲမှာ KEY အမည် 'PAOTEXT' ဖြင့် ပြင်ဆင်ခြင်း
        let payload = {
            data: sentences.map(s => ({ "PAOTEXT": s }))
        };

        fetch(SHEETDB_API_URL, {
            method: 'POST',
            headers: {
                'Accept': 'application/json',
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
        })
        .then(response => response.json())
        .then(data => {
            if (data.created) {
                alert(`အောင်မြင်ပါသည်! စာကြောင်းရေ (${data.created}) ကြောင်းကို Google Sheet ထဲသို့ ထည့်သွင်းပြီးပါပြီ။`);
                sentences = []; // ပို့ပြီးသားစာကြောင်းများကို စာရင်းထဲမှ ဖျက်သိမ်းခြင်း
                updateUI();
            } else {
                alert("တစ်စုံတစ်ရာ မှားယွင်းနေပါသည်။ စာရွက်စာတမ်း Key (PAOTEXT) မှန်မမှန် ပြန်စစ်ပေးပါ။");
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert("အင်တာနက်လိုင်း ချိတ်ဆက်မှု သို့မဟုတ် API သို့ ပို့ဆောင်ရာတွင် အခက်အခဲရှိနေပါသည်။");
        })
        .finally(() => {
            btn.disabled = false;
            btn.innerText = "Save to Google Sheet";
        });
    }

    // Backup အနေဖြင့် .JSON ဒေါင်းလုဒ်လုပ်ရန် ထားရှိခြင်း
    function downloadJSON() {
        if (sentences.length === 0) return alert("ဒေါင်းလုဒ်လုပ်ရန် စာကြောင်းမရှိသေးပါဗျာ။");
        
        let jsonFormat = sentences.map(s => ({
            PAOTEXT: s,
            source: "KhunPhanDuae - Pa'O Digital Hub"
        }));

        let jsonContent = JSON.stringify(jsonFormat, null, 2);
        let blob = new Blob([jsonContent], { type: "application/json;charset=utf-8" });
        
        let link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "pao_sentences_backup.json";
        link.click();
        URL.revokeObjectURL(link.href);
    }
</script>

</body>
</html>
